; ============================================================
; G071_NUCELO_CommBench  ST-Link Flash Tool Config
; Generated by stm32-stlink-flash skill
; ============================================================

[firmware]
; HEX dir (relative to this folder, or absolute)
; 把要燒的 .hex 放這裡；檔名含 8 碼日期 (例 CommBench_20260708.hex) 會自動挑最新
HEX_DIR = hex

[programmer]
; STM32_Programmer_CLI path. AUTO = 掃所有磁碟 + 常見 ST 安裝路徑 (含 CubeIDE 內建版)
CLI_PATH = AUTO

; SWD freq kHz. 4000 (預設) 最穩；線長/雜訊大可降到 1800
SWD_FREQ_KHZ = 4000

; reset mode: SWrst (軟體 reset，任何 STM32 皆通用，預設) / HWrst (需接 NRST 線) / default
RESET_MODE = SWrst

; ------------------------------------------------------------
; [target]  目標板鎖定 (這台 bench 同時接 G071 + H7 兩顆 ST-Link)
; ------------------------------------------------------------
; 為避免誤燒到另一顆 H7 板，工具會依下列規則挑 probe:
;   1. TARGET_SN 有填 -> 用序號精確鎖定 (最保險，但換板要改)
;   2. 否則用 TARGET_BOARD 做 Board Name 子字串比對 (NUCLEO-G071RB 會被 NUCLEO-G071 命中)
;   3. 兩者皆空且只接一顆 -> 用那顆；接多顆 -> 報錯要你設定
; 找不到符合的板會直接報錯 (exit 7)，不會亂燒。
[target]
TARGET_BOARD = NUCLEO-G071
; 目前 G071 板序號 = 0667FF504857788667165423 (要用序號鎖死可填到下面這行)
TARGET_SN =
